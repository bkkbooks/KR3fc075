body:
  text: 廣袤相乘以乘高四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為橢圜尖錐積第十七術橢圜臺體求積倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之併以乘高八而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為橢圜臺積
