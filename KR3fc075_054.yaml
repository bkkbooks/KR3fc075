body:
  text: 切各加差求法第一數自乘再乘半徑羃除之倍之爲一差第一數自乘乘第二數三之半徑羃除之倍之爲二差第一數自乘乘第三數第二數自乘乘第一數相併三之半徑羃除之倍之爲三差第一數自乘乘第四數三之第一數乘第二數又乘第三數六之第二數自乘再乘相併半徑羃除之倍之爲四差如是遞求至單位下而止第十四術有幾分弧之一小弧正弦求大弧正切分母乘正弦爲第一數分母自乘倍之加一乘第一數正弦自乘乘之半徑羃除之二除之三除之爲第二數分母自乘倍之加九乘第二數加一差見下正弦自乘乘之半徑羃除之四除之五除之爲第三數分母自乘倍之加二十五乘第三數加二差見下正弦自乘乘之半徑羃除之六除之七除之爲第四數分母自乘倍之加四十九乘第四數加三差見下正弦自乘乘之半徑羃除之八除之九除之爲第五數分母自乘倍之加八十一乘第五數加四差見下正弦自乘乘之半徑羃除之十除之
