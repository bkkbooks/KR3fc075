body:
  text: 六數順是以下皆如是遞求至單位下乃相併得所求大弧正切各加差求法第二數自乘乘第一數為一差第二數乘第三數倍之又乘第一數為二差第二數乘第四數倍之第三數自乘相併又乘第一數為三差第二數乘第五數第三數乘第四數相併倍之又乘第一數為四差如是遞求至單位下而止
