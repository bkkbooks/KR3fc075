body:
  text: 第五數正分母自乘九之減二乘第五數又以第一數自乘乘之減三差見下半徑羃除之十一除之為第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求小弧正切各減差求法第二數自乘乘第一數為一差第二數乘第三數倍之又乘第一數為二差第二數乘第四數倍之第三數自乘相併又乘第一數為三差第二數乘第五數第三數乘第四數相併倍之又乘第一數為四差如是遞求至單位下而止第十八術有幾分弧之一小弧正切求大弧正切分母乘正切為第一數分母自乘減一乘第一數正切自乘乘之半徑羃除之三除之為第二數分母自乘倍之減三乘第二數正切自乘乘之半徑羃除之五除之為第三數分母自乘倍之減五乘第三數正切自乘乘之加一差見下半徑羃除之七除之為第四數分母自乘倍之減七乘第四數正切自乘乘之加二差見下半徑羃除之九除之為第五數分母自乘倍之減九乘第五數正切自乘乘之加三差見下半徑羃除之十一除之為第
