body:
  text: 各減差求法正切自乘乘第一數半徑羃除之二乘之三乘之爲一差正切自乘乘第二數半徑羃除之四乘之五乘之爲二差正切自乘乘第三數半徑羃除之六乘之七乘之爲三差正切自乘乘第四數半徑羃除之八乘之九乘之爲四差如是遞求至單位下而止第十三術有大弧正弦求幾分弧之一小弧正切分母除正弦爲第一數分母自乘加二乘第一數又以第一數自乘乘之半徑羃除之二除之三除之爲第二數分母自乘九之加二乘第二數加一差見下又以第一數自乘乘之半徑羃除之四除之五除之爲第三數分母自乘二十五之加二乘第三數加二差見下又以第一數自乘乘之半徑羃除之六除之七除之爲第四數分母自乘四十九之加二乘第四數加三差見下又以第一數自乘乘之半徑羃除之八除之九除之爲第五數分母自乘八十一之加二乘第五數加四差見下又以第一數自乘乘之半徑羃除之十除之十一除之爲第六數順是以下皆如是遞求至單位下乃相併得所求小弧正
