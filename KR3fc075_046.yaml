body:
  text: 乘第一數半徑羃除之一乘之二乘之為一差乘法乘第二數半徑羃除之三乘之四乘之為二差乘法乘第三數半徑羃除之五乘之六乘之為三差乘法乘第四數半徑羃除之七乘之八乘之為四差如是遞求至單位下而止第十術有幾分弧之一小弧正切求大弧正弦分母乘正切為第一數正分母自乘加二乘第一數正切自乘乘之半徑羃除之二除之三除之為第二數負分母自乘加十八乘第二數減一差見下正切自乘乘之半徑羃除之四除之五除之為第三數正分母自乘加五十乘第三數減二差見下正切自乘乘之半徑羃除之六除之七除之為第四數負分母自乘加九十八乘第四數減三差見下正切自乘乘之半徑羃除之八除之九除之為第五數正分母自乘加一百六十二乘第五數減四差見下正切自乘乘之半徑羃除之十除之十一除之為第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求大弧正弦各減差求法正切自乘乘第一數半徑羃除之一乘之二乘之為
