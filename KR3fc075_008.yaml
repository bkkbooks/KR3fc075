body:
  text: 單位下乃相併為圜囷積第八術圜錐求積底徑自乘乘高四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為圜錐積第九術圜臺求積上下徑相乘又各自乘併以乘高四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為圜臺積第十術環田求積內外徑相加為和相減為較和較相乘三之四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分
