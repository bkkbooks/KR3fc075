body:
  text: 單位下乃相併爲圜囷積第八術圜錐求積底徑自乘乘高四而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲圜錐積第九術圜臺求積上下徑相乘又各自乘併以乘高四而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲圜臺積第十術環田求積內外徑相加爲和相減爲較和較相乘三之四而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分
