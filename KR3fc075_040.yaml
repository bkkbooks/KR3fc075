body:
  text: 母奇者減盡即止無次數分母偶者不足減即反減正負不復相間以上四術本董方立氏第五術有大弧正弦求幾分弧之一小弧矢分母除正弦得數又自乘半徑除之二除之為第一數分母自乘四之減一乘第一數又倍第一數乘之半徑除之三除之四除之為第二數分母自乘十六之減一乘第二數又倍第一數乘之半徑除之五除之六除之為第三數分母自乘三十六之減一乘第三數又倍第一數乘之半徑除之七除之八除之為第四數順是以下皆如是遞求至單位下乃相併得所求小弧矢第六術有幾分弧之一小弧正弦求大弧矢正弦自乘半徑除之分母自乘乘之二除之為第一數正分母自乘減四乘第一數正弦自乘乘之半徑羃除之三除之四除之為第二數負分母自乘減十六乘第二數正弦自乘乘之半徑羃除之五除之六除之為第三數正分母自乘減三十六乘第三數正弦自乘乘之半徑冪除之七除之八除之為第四數負順是以下皆如是
  hash: sha256:b6fb49a98083614c391e30bd9c97e9f38bbd16ed792b19d842d465dedce98eb5
