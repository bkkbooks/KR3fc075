body:
  text: 第四數正弦自乘乘第四數半徑羃除之七乘之八除之十乘之十二除之為第五數順是以下皆如是遞求至單位下乃相併為又第一數四分又第一數之一二除之三除之為又第二數四分又第二數之一九乘之四除之五除之為又第三數四分又第三數之一二十五乘之六除之七除之為又第四數順是以下皆如是遞求至單位下乃相併得截球積第十四術截球腰鼓求積腰徑自乘三之截高自乘減之又以截高乘之四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併得鼓形積第十五術截球鼓形面徑截高求積面徑自乘三之截高自乘倍之相併乘截高四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順
