body:
  text: 是以下皆如是遞求至單位下乃併諸正數減諸負數以半徑乘之開平方得所求大弧正弦此術以一二三四五各數自乘與分母自乘四之相減減盡即止無次數第九術有大弧正切求幾分弧之一小弧正弦分母除正切為第一數正分母自乘倍之加一乘第一數又以第一數自乘乘之半徑羃除之二除之三除之為第二數負分母自乘十八之加一乘第二數又以第一數自乘乘之半徑羃除之減一差見下四除之五除之為第三數正分母自乘五十之加一乘第三數又以第一數自乘乘之半徑羃除之減二差見下六除之七除之為第四數負分母自乘九十八之加一乘第四數又以第一數自乘乘之半徑羃除之減三差見下八除之九除之為第五數正分母自乘一百六十二之加一乘第五數又以第一數自乘乘之半徑羃除之減四差見下十除之十一除之為第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求小弧正弦各減差求法正切自乘得數復自乘半徑羃除之為乘法乘法
