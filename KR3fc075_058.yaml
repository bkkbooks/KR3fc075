body:
  text: 五數分母自乘二十五之加八乘第五數加四差見下第一數乘之半徑除之十一除之十二除之為第六數順是以下皆如是遞求至單位下乃相併乘半徑為小弧正切之自乘羃平方開之得所求小弧正切各加差求法第一數自乘半徑除之六之為一差第一數乘第二數倍之半徑除之六之為二差第一數乘第三數倍之第二數自乘相併半徑除之六之為三差第一數乘第四數第二數乘第三數相併倍之半徑除之六之為四差如是遞求至單位下而止第十六術有幾分弧之一小弧矢求大弧正切分母自乘乘倍矢為第一數分母自乘八之加一乘第一數倍矢乘之半徑除之三除之四除之為第二數分母自乘八之加四乘第二數加一差見下倍矢乘之半徑除之五除之六除之為第三數分母自乘八之加九乘第三數加二差見下倍矢乘之半徑除之七除之八除之為第四數分母自乘八之加十六乘第四數加三差見下倍矢乘之半徑除之九除之十除之為第五數分母自乘八之加二十五乘第五數加四差見下倍矢乘之半徑
