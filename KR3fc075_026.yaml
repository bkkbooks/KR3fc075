body:
  text: 弦折半即正弦自乘三之加矢羃又以矢乘之二而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數四分第四數之一四十九乘之八除之九除之為第五數順是以下皆如是遞求至單位下乃相併得截球積第十二術截球矢求截球積矢減圜半徑又加圜徑以矢自乘乘之為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為截球積第十三術截球弦求截球積弦折半即正弦自乘復自乘半徑除之三之四而一為第一數正弦自乘乘第一數半徑羃除之一乘之二除之四乘之六除之為第二數正弦自乘乘第二數半徑羃除之三乘之四除之六乘之八除之為第三數正弦自乘乘第三數半徑羃除之五乘之六除之八乘之十除之為
