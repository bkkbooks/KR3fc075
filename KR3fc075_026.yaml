body:
  text: 弦折半卽正弦自乘三之加矢羃又以矢乘之二而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數四分第四數之一四十九乘之八除之九除之爲第五數順是以下皆如是遞求至單位下乃相併得截球積第十二術截球矢求截球積矢減圜半徑又加圜徑以矢自乘乘之爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲截球積第十三術截球弦求截球積弦折半卽正弦自乘復自乘半徑除之三之四而一爲第一數正弦自乘乘第一數半徑羃除之一乘之二除之四乘之六除之爲第二數正弦自乘乘第二數半徑羃除之三乘之四除之六乘之八除之爲第三數正弦自乘乘第三數半徑羃除之五乘之六除之八乘之十除之爲
