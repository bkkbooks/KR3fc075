body:
  text: 圜徑自乘九之爲第一數副置第一數三除之四除之爲第二數四因第二數五除之六除之爲第三數九因第三數七除之八除之爲第四數十六因第四數九除之十除之爲第五數二十五因第五數十一除之十二除之爲第六數順是以下古如是遞求至單位下乃相併爲圜周之自乘羃第六術圜球體積求周五十四因球積爲第一數副置第一數三除之四除之爲第二數四因第二數五除之六除之爲第三數九因第三數七除之八除之爲第四數十六因第四數九除之十除之爲第五數二十五因第五數十一除之十二除之爲第六數順是以下皆如是遞求至單位下乃相併爲圜周之立方積開立方得圜周第七術圜囷求積底徑自乘乘高三之四而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至
