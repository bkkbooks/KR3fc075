body:
  text: 烏程徐有壬君青著第一術弧背求正弦弧背爲第一數正弧背自乘乘第一數半徑羃除之二除之三除之爲第二數負弧背自乘乘第二數半徑羃除之四除之五除之爲第三數正弧背自乘乘第三數半徑羃除之六除之七除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求正弦第二術弧背求正矢弧背自乘半徑除之二除之爲第一數正弧背自乘乘第一數半徑羃除之三除之四除之爲第二數負弧背自乘乘第二數半徑羃除之五除之六除之爲第三數正弧背自乘乘第三數半徑羃除之七除之八除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求正矢第三術正弦求弧背正弦爲第一數正弦自乘乘第一數半徑羃除之二除
