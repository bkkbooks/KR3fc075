body:
  text: 烏程徐有壬君青著第一術有大弧矢求幾分弧之一小弧矢分母自乘以除矢爲第一數分母自乘減一乘第一數又倍第一數乘之半徑除之三除之四除之爲第二數分母自乘四之減一乘第二數又倍第一數乘之半徑除之五除之六除之爲第三數分母自乘九之減一乘第三數又倍第一數乘之半徑除之七除之八除之爲第四數順是以下皆如是遞求至單位下乃相併得所求小弧矢第二術有幾分弧之一小弧矢求大弧矢分母自乘乘矢爲第一數正分母自乘減一乘第一數倍矢乘之半徑除之三除之四除之爲第二數負分母自乘減四乘第二數倍矢乘之半徑除之五除之六除之爲第三數正分母自乘減九乘第三數倍矢乘之半徑除之七除之八除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求大弧矢此術以一二三四各數自乘與分母自乘相減減盡卽
