body:
  text: 正切自乘得數又自乘半徑羃除之爲乘法乘法乘第一數半徑羃除之二乘之三乘之爲一差乘法乘第二數半徑羃除之四乘之五乘之爲二差乘法乘第三數半徑羃除之六乘之七乘之爲三差乘法乘第四數半徑羃除之八乘之九乘之爲四差如是遞求至單位下而止第十二術有幾分弧之一小弧正切求大弧矢分母乘正切得數又自乘半徑除之二除之爲第一數正分母自乘加八乘第一數正切自乘乘之半徑羃除之三除之四除之爲第二數負分母自乘加三十二乘第二數減一差見下正切自乘乘之半徑羃除之五除之六除之爲第三數正分母自乘加七十二乘第三數減二差見下正切自乘乘之半徑羃除之七除之八除之爲第四數負分母自乘加百二十八乘第四數減三差見下正切自乘乘之半徑羃除之九除之十除之爲第五數正分母自乘加二百乘第五數減四差見下正切自乘乘之半徑羃除之十一除之十二除之爲第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求大弧矢
