body:
  text: 止無次數第三術有大弧正弦求幾分弧之一小弧正弦分母除正弦爲第一數分母自乘減一乘第一數又以第一數自乘乘之半徑羃除之二除之三除之爲第二數分母自乘九之減一乘第二數又以第一數自乘乘之半徑羃除之四除之五除之爲第三數分母自乘二十五之減一乘第三數又以第一數自乘乘之半徑冪除之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併得所求小弧正弦第四術有幾分弧之一小弧正弦求大弧正弦分母乘正弦爲第一數正分母自乘減一乘第一數正弦自乘乘之半徑羃除之二除之三除之爲第二數負分母自乘減九乘第二數正弦自乘乘之半徑羃除之四除之五除之爲第三數正分母自乘減二十五乘第三數正弦自乘乘之半徑羃除之六除之七除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求大弧正弦此術以一三五七九各奇數自乘與分母自乘相減分
