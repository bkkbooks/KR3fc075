body:
  text: 之三除之爲第二數正弦自乘乘第二數半徑羃除之九乘之四除之五除之爲第三數正弦自乘乘第三數半徑羃除之二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併得所求弧背第四術正矢求弧背矢乘圜徑爲第一數倍矢乘第一數半徑除之三除之四除之爲第二數倍矢乘第二數半徑除之四乘之五除之六除之爲第三數倍矢乘第三數半徑除之九乘之七除之八除之爲第四數倍矢乘第四數半徑除之十六乘之九除之十除之爲第五數倍矢乘第五數半徑除之二十五乘之十一除之十二除之爲第六數順是以下皆如是遞求至單位下乃相併爲弧背之自乘羃開平方得所求弧背以上四術俱本杜德美氏以後續增第五術弦矢求弧背矢自乘正弦除之倍之三除之爲第一數正矢自乘乘第一數正弦羃除之一乘之五除之爲第二數負矢自乘乘第二數正弦羃除之三乘之七除之爲第三數正
