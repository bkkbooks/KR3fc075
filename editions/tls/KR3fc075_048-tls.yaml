body:
  text: 一差正切自乘乘第二數半徑羃除之三乘之四乘之爲二差正切自乘乘第三數半徑羃除之五乘之六乘之爲三差正切自乘乘第四數半徑羃除之七乘之八乘之爲四差如是遞求至單位下而止第十一術有大弧正切求幾分弧之一小弧矢正切自乘半徑除之分母羃除之二除之爲第一數正分母自乘八之加一乘第一數又倍第一數乘之半徑除之三除之四除之爲第二數負分母自乘三十二之加一乘第二數又倍第一數乘之半徑除之減一差見下五除之六除之爲第三數正分母自乘七十二之加一乘第三數又倍第一數乘之半徑除之減二差見下七除之八除之爲第四數負分母自乘百二十八之加一乘第四數又倍第一數乘之半徑除之減三差見下九除之十除之爲第五數正分母自乘二百之加一乘第五數又倍第一數乘之半徑除之減四差見下十一除之十二除之爲第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求小弧矢各減差求法
