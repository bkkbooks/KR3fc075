  text: 一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲橢圜面積第十四術橢圜蜑體求積廣自乘以乘袤半之爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲橢圜蜑體積第十五術橢圜桶體求積廣袤相乘以乘高三之四而一爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併爲橢圜桶積第十六術橢圜尖錐求積
