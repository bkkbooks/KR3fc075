body:
  text: 是以下皆如是遞求至單位下乃相併得鼓形積第十六術圜內各形之一邊求圜外各形之一邊圜內邊爲第一數邊自乘乘第一數圜徑羃除之一乘之二除之爲第二數邊自乘乘第二數圜徑羃除之三乘之四除之爲第三數邊自乘乘第三數圜徑羃除之五乘之六除之爲第四數順是以下皆如是遞求至單位下乃相併爲圜外邊第十七術圜外各形之一邊求圜內各形之一邊圜外邊爲第一數正邊自乘乘第一數圜徑羃除之一乘之二除之爲第二數負邊自乘乘第二數圜徑羃除之三乘之四除之爲第三數正邊自乘乘第三數圜徑羃除之五乘之六除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求圜內邊第十八術圜內幾等邊形積求圜外同式形積圜內積爲第一數倍積自乘乘第一數半徑羃除之邊數羃除之半徑羃又除之一乘之四除之爲第二數倍積自乘乘第二數半徑羃除之邊數羃除之半徑羃又除
