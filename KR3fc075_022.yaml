body:
  text: 第六數順是以下皆如是遞求至單位下乃相併得所求正切各加差求法第二數以下通行自乘又乘第一數得各加差分析如下第二數自乘乘第一數爲一差第二數乘第三數倍之又乘第一數爲二差第二數乘第四數倍之第三數自乘相併又乘第一數爲三差第二數乘第五數倍之第三數乘第四數倍之相併又乘第一數爲四差至單位下而止第八術弦矢求弧田積倍矢乘通弦三除之爲第一數正矢自乘乘第一數正弦羃除之五除之爲第二數正矢自乘乘第二數正弦羃除之一乘之七除之爲第三數負矢自乘乘第三數正弦羃除之三乘之九除之爲第四數正矢自乘乘第四數正弦羃除之五乘之十一除之爲第五數負矢自乘乘第五數正弦羃除之七乘之十三除之爲第六數正順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求弧田積第九術
