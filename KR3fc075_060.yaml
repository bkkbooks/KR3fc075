body:
  text: 除之十一除之十二除之爲第六數順是以下皆如是遞求至單位下乃相併乘半徑爲大弧正切之自乘羃平方開之得所求大弧正切各加差求法第一數自乘半徑除之分母自乘乘之六之爲一差第一數乘第二數倍之半徑除之分母自乘乘之六之爲二差第一數乘第三數倍之第二數自乘相併半徑除之分母自乘乘之六之爲三差第一數乘第四數第二數乘第三數相併倍之半徑除之分母自乘乘之六之爲四差如是遞求至單位下而止第十七術有大弧正切求幾分弧之一小弧正切分母除正切爲第一數正分母自乘減一乘第一數又以第一數自乘乘之半徑羃除之三除之爲第二數負分母自乘三之減二乘第二數又以第一數自乘乘之半徑羃除之五除之爲第三數正分母自乘五之減二乘第三數又以第一數自乘乘之減一差見下半徑羃除之七除之爲第四數負分母自乘七之減二乘第四數又以第一數自乘乘之減二差見下半徑羃除之九除之爲
