body:
  text: 烏程徐有壬君青著第一術圜徑求周三因圜徑爲第一數四分第一數之一二除之三除之爲第二數四分第二數之一九乘之四除之五除之爲第三數四分第三數之一二十五乘之六除之七除之爲第四數四分第四數之一四十九乘之八除之九除之爲第五數四分第五數之一八十一乘之十除之十一除之爲第六數順是以下皆如是遞求至單位下乃相併爲圜周此杜德美原法秀水朱先生依法步算徑一者周三一四一五九二六五三五八九七九三二三八四六二六四三一八六三六七四七二二七九五一四周十者徑三一八三九八八六一八三七九六七一五三七七六七五四六六九六三八九五六六六一第二術圜徑求面積徑自乘三之四而一爲第一數四分第一數之一二除
