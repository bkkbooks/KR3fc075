body:
  text: 通弦求弧田積正弦自乘乘通弦半徑除之三除之為第一數正弦自乘乘第一數半徑羃除之一乘之二除之三乘之五除之為第二數正弦自乘乘第二數半徑羃除之三乘之四除之五乘之七除之為第三數正弦自乘乘第三數半徑羃除之五乘之六除之七乘之九除之為第四數正弦自乘乘第四數半徑羃除之七乘之八除之九乘之十一除之為第五數正弦自乘乘第五數半徑羃除之九乘之十除之十一乘之十三除之為第六數順是以下皆如是遞求至單位下乃相併為弧田積第十術通弧求弧田積通弧自乘乘半弧半徑除之二除之三除之為第一數正通弧自乘乘第一數半徑羃除之四除之五除之為第二數負通弧自乘乘第二數半徑羃除之六除之七除之為第三數正通弧自乘乘第三數半徑羃除之八除之九除之為第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得弧田積第十一術截球弦矢求截球積
