body:
  text: 遞求至單位下乃併諸正數減諸負數得所求大弧矢此術以二四六八十各偶數自乘與分母自乘相減分母偶者減盡卽止無次數分母奇者不足減卽反減爾後正負皆相從不相閒第七術有大弧矢求幾分弧之一小弧正弦分母自乘以除倍矢爲第一數分母自乘減四乘第一數又以第一數乘之半徑除之三除之四除之爲第二數分母自乘四之減四乘第二數又以第一數乘之半徑除之五除之六除之爲第三數分母自乘九之減四乘第三數又以第一數乘之半徑除之七除之八除之爲第四數順是以下皆如是遞求至單位下乃相併乘半徑開平方得所求小弧正弦第八術有幾分弧之一小弧矢求大弧正弦分母自乘乘倍矢爲第一數正分母自乘四之減一乘第一數倍矢乘之半徑除之三除之四除之爲第二數負分母自乘四之減四乘第二數倍矢乘之半徑除之五除之六除之爲第三數正分母自乘四之減九乘第三數倍矢乘之半徑除之七除之八除之爲第四數負順
