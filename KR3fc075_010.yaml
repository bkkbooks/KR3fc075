body:
  text: 第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為環田積第十一術圜內容方積求圜積方積折半三之為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是遞求至單位下乃相併為圜面積第十二術球內立方積求球積立方折半自乘二十七因之為第一數副置第一數三除之四除之為第二數四因第二數五除之六除之為第三數九因第三數七除之八除之為第四數十六因第四數九除之十除之為第五數二十五因第五數十一除之十二除之為第六數順是以下皆如是遞求至單位下乃相併為球積之自乘羃開平方得球積第十三術橢圜求面積橢圜廣袤相乘三之四而一為第一數四分第一數之
