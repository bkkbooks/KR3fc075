body:
  text: 之九乘之四除之五除之爲第三數倍積自乘乘第三數半徑羃除之邊數羃除之半徑羃又除之二十五乘之六除之七除之爲第四數順是以下皆如是遞求至單位下乃相併得所求圜面積第二十一術圜外幾等邊形面積求圜面積圜外積爲第一數正積自乘乘第一數半徑羃除之邊數羃除之半徑羃又除之一乘之三除之爲第二數負積自乘乘第二數半徑羃除之邊數羃除之半徑羃又除之三乘之五除之爲第三數正積自乘乘第三數半徑羃除之邊數羃除之半徑羃又除之五乘之七除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求圜面積
