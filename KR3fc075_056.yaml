body:
  text: 十一除之為第六數順是以下皆如是遞求至單位下乃相併得所求大弧正切各加差求法第一數自乘再乘半徑羃除之倍之分母自乘乘之為一差第一數自乘乘第二數三之半徑羃除之倍之分母自乘乘之為二差第一數自乘乘第三數第二數自乘乘第一數相併三之半徑羃除之倍之分母自乘乘之為三差第一數自乘乘第四數三之第一數乘第二數又乘第三數六之第二數自乘再乘相併半徑羃除之倍之分母自乘乘之為四差如是遞求至單位下而止第十五術有大弧矢求幾分弧之一小弧正切分母目乘以除倍矢為第一數分母自乘加八乘第一數又以第一數乘之半徑除之三除之四除之為第二數分母自乘四之加八乘第二數加一差見下第一數乘之半徑除之五除之六除之為第三數分母自乘九之加八乘第三數加二差見下第一數乘之半徑除之七除之八除之為第四數分母自乘十六之加八乘第四數加三差見下第一數乘之半徑除之九除之十除之為第
