body:
  text: 矢自乘乘第三數正弦羃除之五乘之九除之爲第四數負矢自乘乘第四數正弦羃除之七乘之十一除之爲第五數正矢自乘乘第五數正弦羃除之九乘之十三除之爲第六數負順是以下皆如是遞求至單位下乃併諸正數減諸負數爲弦背差加正弦得所求弧背第六術正切求弧背正切爲第一數正正切自乘乘第一數半徑羃除之一乘之三除之爲第二數負正切自乘乘第二數半徑羃除之三乘之五除之爲第三數正正切自乘乘第三數半徑羃除之五乘之七除之爲第四數負順是以下皆如是遞求至單位下乃併諸正數減諸負數得所求弧背第七術弧背求正切弧背爲第一數弧背自乘乘第一數半徑羃除之三除之爲第二數弧背自乘倍之乘第二數半徑羃除之五除之爲第三數弧背自乘倍之乘第三數加一差見下半徑羃除之七除之爲第四數弧背自乘倍之乘第四數加二差見下半徑羃除之九除之爲第五數弧背自乘倍之乘第五數加三差見下半徑羃除之十一除之爲
